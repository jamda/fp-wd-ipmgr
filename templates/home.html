<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Identity API</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont;
            background: #f6f7f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 2rem 3rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }
        a {
            display: block;
            margin: 0.75rem 0;
            text-decoration: none;
            font-weight: 500;
            color: #2563eb;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Identities and Profiles Manager</h1>

        <a href="{% url 'accounts:login' %}">Sign in</a>
        <a href="{% url 'accounts:register' %}">Register</a>
        <a href="/oauth/get-token/">Get OAuth Token</a>
    </div>
</body>
</html>
